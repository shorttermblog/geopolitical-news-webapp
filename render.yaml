services:
  - type: web
    name: geopolitical-news-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements-light.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENAI_QUERY_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-4.1

  - type: web
    name: geopolitical-news-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
